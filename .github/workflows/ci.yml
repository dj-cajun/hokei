name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hokei
          POSTGRES_PASSWORD: hokei_ci
          POSTGRES_DB: hokei_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hokei -d hokei_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hokei:hokei_ci@localhost:5432/hokei_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma Client
        run: npx tsx scripts/prisma-generate-for-deploy.ts

      - name: Prepare CI database
        run: |
          npx prisma db push --schema=prisma/schema.prisma
          npx tsx scripts/seed-e2e.ts

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-secret-min-32-chars-long
          CRON_SECRET: ci-cron-secret-min-32-chars-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3001

      - name: E2E smoke
        run: npm run test:e2e
        env:
          AUTH_SECRET: ci-build-secret-min-32-chars-long
          CRON_SECRET: ci-cron-secret-min-32-chars-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3001
          CI: true
